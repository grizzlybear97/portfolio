<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <title>socials</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

     <header>
        <h1>sandeep's portfolio</h1>
        <nav>
            <a href="index.html">home</a>
            <a href="projects.html">projects</a>
            <a href="showcase.html">showcase</a>
            <a href="socials.html">socials</a>
        </nav>
     </header>

     <main>
        <div class="contact-form">
            <h2>contact me</h2>
            <form action="/send-message" method="post">
                <fieldset>
                    <div>
                        <label for="name">name</label>
                        <input type="text" name="name" id="name">
                    </div>
                    <div>
                        <label for="email">email</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div>
                        <label class="message-box" for="message">message</label>
                        <textarea id="message" name="message" rows="5"></textarea>
                    </div>
                    <div class="send-message-btn">
                        <button type="submit">send message</button>
                    </div>
                </fieldset>
            </form>
        </div>
        <div class="social-links">
            <h2>socials</h2>
            <div>
                <a href="github.com/grizzlybear97"><img src="images/icons/github.svg" alt="github profile"></a>
                <a href="linkedin.com"><img src="images/icons/linkedin.svg" alt="linkedin profile"></a>
            </div>
        </div>
     </main>

    <footer>
       <p>copyright@sandeepapp.com</p>
    </footer>

</body>
</html>
